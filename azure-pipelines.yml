trigger:
- main

variables:
  imageRepository: devtrackr
  containerRegistry: devtrackrregistry123.azurecr.io
  dockerRegistryServiceConnection: devtrackrregistry123
  kubernetesServiceConnection: notesapp-aks-devtrackr
  tag: $(Build.BuildId)

stages:

# =========================
# 1. BUILD & PUSH IMAGE
# =========================
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: '**/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

# =========================
# 2. DEPLOY TO AKS
# =========================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: KubernetesManifest@0
      displayName: Deploy to AKS
      inputs:
        action: deploy
        kubernetesServiceConnection: $(kubernetesServiceConnection)
        manifests: |
          deployment.yaml
          service.yaml
        containers: |
          $(containerRegistry)/$(imageRepository):$(tag)